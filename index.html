<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  color:gold;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

.screen{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

input,button{
  padding:12px;
  margin:10px;
  font-size:16px;
  border-radius:10px;
  border:none;
}

button{
  background:gold;
  color:black;
  font-weight:bold;
}

.meter{
  width:80%;
  height:25px;
  background:#333;
  border-radius:20px;
  overflow:hidden;
}

.meter-fill{
  height:100%;
  width:0%;
  background:gold;
}

.card{
  background:#222;
  padding:15px;
  margin:10px;
  border-radius:10px;
  width:120px;
}

footer{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<div class="screen" id="main">

<h2>🎁 Enter Birthday Legend</h2>
<input type="text" id="name" placeholder="Enter Name">
<input type="number" id="age" placeholder="Enter Age">
<button onclick="generateLink()">Generate Wish Link 🔗</button>
<p id="result"></p>

</div>

<footer>
Created with 💛 by <b>Seron</b>
</footer>

<script>

function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="ta-IN";
  window.speechSynthesis.speak(speech);
}

const params=new URLSearchParams(window.location.search);
const urlName=params.get("name");
const urlAge=params.get("age");

if(urlName && urlAge){
  setTimeout(()=>start(urlName,urlAge),500);
}

function generateLink(){
  let name=document.getElementById("name").value.trim();
  let age=document.getElementById("age").value.trim();

  if(name=="" || age==""){
    alert("Enter name and age da!");
    return;
  }

  let link=window.location.origin+window.location.pathname+
  "?name="+encodeURIComponent(name)+"&age="+encodeURIComponent(age);

  document.getElementById("result").innerHTML=
  "<input style='width:90%' value='"+link+"' readonly><br><br>"+
  "<button onclick='copyLink(\""+link+"\")'>Copy</button><br><br>"+
  "<button onclick='shareLink(\""+link+"\")'>WhatsApp Share</button>";
}

function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("Link copied 🔥");
}

function shareLink(link){
  window.open("https://wa.me/?text=Open this Birthday Surprise 🔥👉 "+link);
}

function start(name,age){
  countdown(name,age);
}

function countdown(name,age){
  let count=5;
  document.getElementById("main").innerHTML="<h1 id='count'></h1>";
  let interval=setInterval(()=>{
    document.getElementById("count").innerHTML=count;
    count--;
    if(count<0){
      clearInterval(interval);
      showGift(name,age);
    }
  },1000);
}

function showGift(name,age){
  document.getElementById("main").innerHTML=
  "<div style='font-size:100px;' onclick='openGift(\""+name+"\",\""+age+"\")'>🎁</div>"+
  "<p>Tap Gift</p>";
}

function openGift(name,age){
  speak("Atula onum illa daaa!");
  document.getElementById("main").innerHTML="<h1>😂 Atula Onum Illa!</h1>";
  setTimeout(()=>friendship(name,age),3000);
}

function friendship(name,age){
  document.getElementById("main").innerHTML=
  "<h2>Friendship Level</h2>"+
  "<div class='meter'><div class='meter-fill' id='fill'></div></div>"+
  "<p id='percent'></p>";

  let percent=0;
  let interval=setInterval(()=>{
    percent++;
    document.getElementById("fill").style.width=percent+"%";
    document.getElementById("percent").innerHTML=percent+"%";
    if(percent>=95){
      clearInterval(interval);
      setTimeout(()=>scratch(name,age),1000);
    }
  },20);
}

function scratch(name,age){
  document.getElementById("main").innerHTML=
  "<h2>Pick a Gift 🎟️</h2>"+
  "<div class='card' onclick='reveal(this,\""+name+"\",\""+age+"\")'>🎁 1</div>"+
  "<div class='card' onclick='reveal(this,\""+name+"\",\""+age+"\")'>🎁 2</div>"+
  "<div class='card' onclick='reveal(this,\""+name+"\",\""+age+"\")'>🎁 3</div>"+
  "<div class='card' onclick='reveal(this,\""+name+"\",\""+age+"\")'>🎁 4</div>";
}

function reveal(card,name,age){
  const gifts=[
    "Old Geometry Box 😂",
    "Expired Chocolate 🍫",
    "Tea Treat Coupon ☕",
    "Maturity Update Loading 🤣"
  ];
  card.innerHTML=gifts[Math.floor(Math.random()*gifts.length)];
  setTimeout(()=>final(name,age),2000);
}

function final(name,age){
  const roasts=[
    name+" "+age+" vayasu... brain buffering 😂",
    age+" aachu... amma baby dhaan 😎",
    name+" ku cake vida filter strong 🤣"
  ];
  let roast=roasts[Math.floor(Math.random()*roasts.length)];

  document.getElementById("main").innerHTML=
  "<h1>🎉 HAPPY BIRTHDAY "+name+" 🎉</h1>"+
  "<h3>"+roast+"</h3>"+
  "<button onclick='shareLink(window.location.href)'>Share 🔗</button>";

  speak("Happy Birthday "+name);
  confetti({particleCount:200,spread:120});
}

</script>

</body>
</html>
