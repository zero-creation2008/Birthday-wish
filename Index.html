<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cinematic Birthday Surprise</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
body{
  margin:0;
  background:black;
  color:gold;
  text-align:center;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}
.container{padding:30px;}
input,button{
  padding:12px;
  margin:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
}
button{
  background:gold;
  color:black;
  cursor:pointer;
}
.meter{
  width:80%;
  height:25px;
  background:#333;
  margin:auto;
  border-radius:20px;
}
.meter-fill{
  height:100%;
  width:0%;
  background:gold;
  border-radius:20px;
}
.card{
  display:inline-block;
  background:#222;
  padding:20px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
  width:120px;
}
footer{
  margin-top:40px;
  color:white;
}
</style>
</head>
<body>

<div class="container" id="main">
<h2>🎁 Who is the Birthday Legend?</h2>
<input type="text" id="name" placeholder="Enter Name">
<input type="number" id="age" placeholder="Enter Age">
<br>
<button onclick="generateLink()">Generate Surprise Link 🔗</button>
</div>

<footer>
Created with 💛 by <b>Seron</b>
</footer>

<script>

function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="ta-IN";
  window.speechSynthesis.speak(speech);
}

// 🔹 Read URL
const params = new URLSearchParams(window.location.search);
const urlName = params.get("name");
const urlAge = params.get("age");

if(urlName && urlAge){
  setTimeout(()=>startCinematic(urlName,urlAge),500);
}

function generateLink(){
  let name=document.getElementById("name").value;
  let age=document.getElementById("age").value;

  if(name=="" || age==""){
    alert("Enter name and age da!");
    return;
  }

  let link=window.location.origin + window.location.pathname +
  "?name="+encodeURIComponent(name)+"&age="+encodeURIComponent(age);

  document.getElementById("main").innerHTML=
  "<h2>Share this Surprise Link 🔗</h2>"+
  "<input style='width:80%' value='"+link+"' readonly><br><br>"+
  "<button onclick='window.open(\"https://wa.me/?text=Open this Birthday Surprise 🔥👉 "+link+"\")'>Share on WhatsApp</button>";
}

function startCinematic(name,age){
  countdown(name,age);
}

function countdown(name,age){
  let count=5;
  document.getElementById("main").innerHTML="<h1 id='count'></h1>";
  let interval=setInterval(()=>{
    document.getElementById("count").innerHTML=count;
    count--;
    if(count<0){
      clearInterval(interval);
      showGift(name,age);
    }
  },1000);
}

function showGift(name,age){
  document.getElementById("main").innerHTML=
  "<div style='font-size:100px;cursor:pointer;' onclick='openGift(\""+name+"\",\""+age+"\")'>🎁</div>"+
  "<p>Open the Gift</p>";
}

function openGift(name,age){
  speak("Atula onum illa daaa!");
  document.getElementById("main").innerHTML="<h1>😂 Atula Onum Illa!</h1>";
  setTimeout(()=>friendshipMeter(name,age),3000);
}

function friendshipMeter(name,age){
  document.getElementById("main").innerHTML=
  "<h2>Friendship Level</h2>"+
  "<div class='meter'><div class='meter-fill' id='fill'></div></div>"+
  "<p id='percent'></p>";

  let percent=0;
  let interval=setInterval(()=>{
    percent++;
    document.getElementById("fill").style.width=percent+"%";
    document.getElementById("percent").innerHTML=percent+"%";
    if(percent>=95){
      clearInterval(interval);
      setTimeout(()=>showScratch(name,age),1000);
    }
  },20);
}

function showScratch(name,age){
  document.getElementById("main").innerHTML=
  "<h2>Scratch a Gift 🎟️</h2>"+
  "<div class='card' onclick='revealGift(this,\""+name+"\",\""+age+"\")'>🎁 Gift 1</div>"+
  "<div class='card' onclick='revealGift(this,\""+name+"\",\""+age+"\")'>🎁 Gift 2</div>"+
  "<div class='card' onclick='revealGift(this,\""+name+"\",\""+age+"\")'>🎁 Gift 3</div>"+
  "<div class='card' onclick='revealGift(this,\""+name+"\",\""+age+"\")'>🎁 Gift 4</div>";
}

function revealGift(card,name,age){
  const gifts=[
    "Old Geometry Box 😂",
    "Expired Chocolate 🍫",
    "Unlimited Tea Treat ☕",
    "Maturity Update Loading 🤣"
  ];
  card.innerHTML=gifts[Math.floor(Math.random()*gifts.length)];
  setTimeout(()=>finalReveal(name,age),2000);
}

function finalReveal(name,age){

  const roasts=[
    name+" "+age+" vayasu aachu... brain still buffering 😂",
    age+" aachu... still amma baby dhaan 😎",
    name+" ku cake vida filter coffee strong 🤣"
  ];

  let roast=roasts[Math.floor(Math.random()*roasts.length)];

  document.getElementById("main").innerHTML=
  "<h1>🎉 HAPPY BIRTHDAY "+name+" 🎉</h1>"+
  "<h3>"+roast+"</h3>"+
  "<button onclick='share()'>Share Again 🔗</button>";

  speak("Happy Birthday "+name);
  confetti({
    particleCount:150,
    spread:100
  });
}

function share(){
  let url=window.location.href;
  window.open("https://wa.me/?text=See this Birthday Surprise 🔥👉 "+url);
}

</script>

</body>
</html>
